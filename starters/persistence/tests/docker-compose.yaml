version: "3.9"

services:
    postgres:
        image: postgres:alpine
        ports:
            - "5435:5432"
        environment:
            POSTGRES_PASSWORD: postgres
            POSTGRES_USER: postgres
            POSTGRES_DB: test
        healthcheck:
            test: ["CMD-SHELL", "pg_isready", "-d", "test", "-U", "postgres"]
            interval: 1s
            timeout: 5s
            retries: 10
            start_period: 3s

    mongodb:
        image: "mongo:8.2.5"
        container_name: "typeorm-mongodb"
        command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
        ports:
            - "27017:27017"
        healthcheck:
            test: ["CMD-SHELL", "mongosh --quiet --eval 'if (!db.hello().isWritablePrimary) { quit(1); }'"]
            interval: 5s
            timeout: 5s
            retries: 20
        volumes:
            - ./docker/mongodb/init-replica-set.js:/docker-entrypoint-initdb.d/init-replica-set.js:ro
            - mongodb-data:/data/db

volumes:
    mongodb-data:
